# GRUB configuration for ralphglasses thin client
# Hardware: ASUS ProArt X870E-CREATOR WIFI, Ryzen 9 7950X, RTX 4090
#
# This is a template — the installer copies it to /boot/grub/grub.cfg
# and substitutes the correct root UUID.
#
# See also:
#   distro/hardware/proart-x870e.md — full hardware manifest
#   distro/scripts/hw-detect.sh     — first-boot GPU detection

set default=0
set timeout=5

serial --speed=115200 --unit=0 --word=8 --parity=no --stop=1
terminal_input serial console
terminal_output serial console

menuentry "Ubuntu (NVIDIA RTX 4090)" {
    linux /vmlinuz root=UUID=ROOTFS-UUID-HERE ro quiet splash nvidia-drm.modeset=1
    initrd /initrd.img
}

menuentry "Ubuntu (AMD iGPU)" {
    linux /vmlinuz root=UUID=ROOTFS-UUID-HERE ro quiet splash amdgpu.dc=1
    initrd /initrd.img
}

menuentry "Ralphglasses – Headless / Serial Console" {
    linux /vmlinuz root=UUID=ROOTFS-UUID-HERE ro quiet splash console=tty0 console=ttyS0,115200n8
    initrd /initrd.img
}

menuentry "Ubuntu (AMD iGPU fallback)" {
    linux /vmlinuz root=UUID=ROOTFS-UUID-HERE ro nomodeset amdgpu.dc=0 nvidia.modeset=0 modprobe.blacklist=nvidia,nvidia_drm,nvidia_uvm,nvidia_modeset
    initrd /initrd.img
}

menuentry "Ubuntu (recovery mode)" {
    linux /vmlinuz root=UUID=ROOTFS-UUID-HERE ro single nomodeset
    initrd /initrd.img
}
