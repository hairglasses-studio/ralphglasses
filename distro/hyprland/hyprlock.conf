# Hyprlock — emergency-only lock screen for ralphglasses thin client
# Snazzy-on-Black palette

background {
    color = rgb(1a1b26)
}

input-field {
    size = 300, 50
    outline_thickness = 2
    outer_color = rgb(57c7ff)
    inner_color = rgb(282a36)
    font_color = rgb(f1f1f0)
    fade_on_empty = true
    placeholder_text = <i>ralphglasses</i>
    dots_size = 0.3
    dots_spacing = 0.15
    position = 0, -20
    halign = center
    valign = center
}
