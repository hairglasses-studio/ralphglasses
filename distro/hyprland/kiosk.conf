# Hyprland kiosk-mode config for ralphglasses thin client
#
# Boots directly into ralphglasses TUI fullscreen on all 7 monitors.
# No window decorations, no desktop, no distractions.
#
# Hardware target: ASUS ProArt X870E-CREATOR WIFI
#   - GPU 0: NVIDIA RTX 4090 (DP-1..DP-3, HDMI-A-1)
#   - GPU 1: AMD iGPU fallback (HDMI-A-2, DP-4, DP-5)
#   - 7 monitors total
#
# Install: distro/scripts/hyprland-kiosk-setup.sh
# Normal config: distro/hyprland/hyprland.conf
# Compositor commands: distro/scripts/compositor-cmd.sh

# ═══════════════════════════════════════════════════════════════════════
# NVIDIA Wayland environment
# ═══════════════════════════════════════════════════════════════════════
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1
env = MOZ_ENABLE_WAYLAND,1
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = LIBVA_DRIVER_NAME,nvidia
env = __GL_GSYNC_ALLOWED,1
env = __GL_VRR_ALLOWED,1

exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# ═══════════════════════════════════════════════════════════════════════
# Modifier key
# ═══════════════════════════════════════════════════════════════════════
$mod = SUPER

# ═══════════════════════════════════════════════════════════════════════
# Monitor assignments — update to match `hyprctl monitors` output.
# hw-detect.sh --wayland-only can generate these.
# ═══════════════════════════════════════════════════════════════════════
$mon1 = DP-1
$mon2 = DP-2
$mon3 = DP-3
$mon4 = HDMI-A-1
$mon5 = HDMI-A-2
$mon6 = DP-4
$mon7 = DP-5

monitor = $mon1, preferred, auto, 1
monitor = $mon2, preferred, auto, 1
monitor = $mon3, preferred, auto, 1
monitor = $mon4, preferred, auto, 1
monitor = $mon5, preferred, auto, 1
monitor = $mon6, preferred, auto, 1
monitor = $mon7, preferred, auto, 1

# ═══════════════════════════════════════════════════════════════════════
# Workspace → monitor mapping (1:1 for 7 monitors)
# ═══════════════════════════════════════════════════════════════════════
workspace = 1, monitor:$mon1
workspace = 2, monitor:$mon2
workspace = 3, monitor:$mon3
workspace = 4, monitor:$mon4
workspace = 5, monitor:$mon5
workspace = 6, monitor:$mon6
workspace = 7, monitor:$mon7

# ═══════════════════════════════════════════════════════════════════════
# Input — keyboard repeat (fast for TUI navigation)
# ═══════════════════════════════════════════════════════════════════════
input {
    kb_layout = us
    repeat_delay = 200
    repeat_rate = 40
}

# ═══════════════════════════════════════════════════════════════════════
# Appearance — zero chrome kiosk mode
# ═══════════════════════════════════════════════════════════════════════
general {
    gaps_in = 0
    gaps_out = 0
    border_size = 0
    layout = dwindle
}

decoration {
    rounding = 0

    blur {
        enabled = false
    }

    shadow {
        enabled = false
    }
}

animations {
    enabled = false
}

dwindle {
    pseudotile = false
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

xwayland {
    force_zero_scaling = true
}

# ═══════════════════════════════════════════════════════════════════════
# Window rules — zero chrome, forced fullscreen
# ═══════════════════════════════════════════════════════════════════════
windowrulev2 = fullscreen, class:^(foot)$
windowrulev2 = noborder, class:^(foot)$
windowrulev2 = noshadow, class:^(foot)$
windowrulev2 = noblur, class:^(foot)$

# No status bar in kiosk mode — the TUI itself is the dashboard
# Uncomment to re-enable for debugging:
# exec-once = waybar

# ═══════════════════════════════════════════════════════════════════════
# Emergency keybindings — these are the ONLY keybindings in kiosk mode
# ═══════════════════════════════════════════════════════════════════════

# Emergency exit — kills Hyprland, drops to TTY
# Ctrl+Alt+Backspace (classic zap)
bind = CTRL ALT, BackSpace, exit,

# Emergency reload — reloads Hyprland config without killing sessions
bind = $mod SHIFT, C, exec, /usr/local/bin/compositor-cmd.sh reload

# Switch to normal (non-kiosk) config and reload
# Mod+Escape — swap kiosk config for normal config
bind = $mod, Escape, exec, bash -c 'cp /opt/ralphglasses/distro/hyprland/hyprland.conf /home/ralph/.config/hypr/hyprland.conf && hyprctl reload'

# ═══════════════════════════════════════════════════════════════════════
# Workspace navigation — needed to move between monitors
# ═══════════════════════════════════════════════════════════════════════
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7

# Move focused container to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7

# Focus between monitors
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r

# ═══════════════════════════════════════════════════════════════════════
# Auto-start — launch ralphglasses TUI on all 7 workspaces
#
# Each workspace gets its own alacritty instance running ralphglasses.
# The TUI handles its own session management per workspace.
# Stagger launches by 0.5s to avoid GPU contention during init.
# Uses hyprctl dispatch to target specific workspaces.
# ═══════════════════════════════════════════════════════════════════════

# Workspace 1: primary control surface
exec-once = hyprctl dispatch workspace 1 && foot --app-id rg-ws1 -e /usr/local/bin/ralphglasses --scan-path $HOME/hairglasses-studio

# Workspaces 2-7: additional fleet surfaces (staggered start)
exec-once = sleep 0.5 && hyprctl dispatch workspace 2 && foot --app-id rg-ws2 -e /usr/local/bin/ralphglasses --scan-path $HOME/hairglasses-studio
exec-once = sleep 1.0 && hyprctl dispatch workspace 3 && foot --app-id rg-ws3 -e /usr/local/bin/ralphglasses --scan-path $HOME/hairglasses-studio
exec-once = sleep 1.5 && hyprctl dispatch workspace 4 && foot --app-id rg-ws4 -e /usr/local/bin/ralphglasses --scan-path $HOME/hairglasses-studio
exec-once = sleep 2.0 && hyprctl dispatch workspace 5 && foot --app-id rg-ws5 -e /usr/local/bin/ralphglasses --scan-path $HOME/hairglasses-studio
exec-once = sleep 2.5 && hyprctl dispatch workspace 6 && foot --app-id rg-ws6 -e /usr/local/bin/ralphglasses --scan-path $HOME/hairglasses-studio
exec-once = sleep 3.0 && hyprctl dispatch workspace 7 && foot --app-id rg-ws7 -e /usr/local/bin/ralphglasses --scan-path $HOME/hairglasses-studio

# Assign each instance to its workspace by class
windowrulev2 = workspace 1, class:^(rg-ws1)$
windowrulev2 = workspace 2, class:^(rg-ws2)$
windowrulev2 = workspace 3, class:^(rg-ws3)$
windowrulev2 = workspace 4, class:^(rg-ws4)$
windowrulev2 = workspace 5, class:^(rg-ws5)$
windowrulev2 = workspace 6, class:^(rg-ws6)$
windowrulev2 = workspace 7, class:^(rg-ws7)$

# ═══════════════════════════════════════════════════════════════════════
# Display power — kiosk should never sleep
# ═══════════════════════════════════════════════════════════════════════
exec-once = hypridle

# ═══════════════════════════════════════════════════════════════════════
# Watchdog — restart ralphglasses if it crashes
# Systemd watchdog.service handles this at the service level.
# At the Hyprland level, we re-launch if the window closes unexpectedly.
# Use compositor-cmd.sh for cross-compositor watchdog support.
# ═══════════════════════════════════════════════════════════════════════
exec-once = bash -c '\
    while true; do \
        sleep 10; \
        for ws in 1 2 3 4 5 6 7; do \
            count=$(/usr/local/bin/compositor-cmd.sh clients | jq "[.[] | select(.class == \"rg-ws${ws}\")] | length" 2>/dev/null || echo 0); \
            if [ "$count" -eq 0 ]; then \
                /usr/local/bin/compositor-cmd.sh workspace ${ws} && foot --app-id rg-ws${ws} -e /usr/local/bin/ralphglasses --scan-path $HOME/hairglasses-studio & \
            fi; \
        done; \
    done'
