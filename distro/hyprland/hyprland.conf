# Hyprland config for ralphglasses thin client
# 7-monitor, dual-NVIDIA-GPU setup
#
# Modify $mon1-$mon7 to match your output names.
# Run `hyprctl monitors` to discover them.

# ═══════════════════════════════════════════════════════════════════════
# NVIDIA Wayland environment
# ═══════════════════════════════════════════════════════════════════════
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1
env = MOZ_ENABLE_WAYLAND,1
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = LIBVA_DRIVER_NAME,nvidia
env = __GL_GSYNC_ALLOWED,1
env = __GL_VRR_ALLOWED,1

exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# ═══════════════════════════════════════════════════════════════════════
# Modifier key
# ═══════════════════════════════════════════════════════════════════════
$mod = SUPER

# ═══════════════════════════════════════════════════════════════════════
# Monitor assignments — update to match `hyprctl monitors` output.
# hw-detect.sh --wayland-only can generate these.
# ═══════════════════════════════════════════════════════════════════════
$mon1 = DP-1
$mon2 = DP-2
$mon3 = DP-3
$mon4 = HDMI-A-1
$mon5 = HDMI-A-2
$mon6 = DP-4
$mon7 = DP-5

monitor = $mon1, preferred, auto, 1
monitor = $mon2, preferred, auto, 1
monitor = $mon3, preferred, auto, 1
monitor = $mon4, preferred, auto, 1
monitor = $mon5, preferred, auto, 1
monitor = $mon6, preferred, auto, 1
monitor = $mon7, preferred, auto, 1

# ═══════════════════════════════════════════════════════════════════════
# Workspace → monitor mapping (1:1 for 7 monitors)
# ═══════════════════════════════════════════════════════════════════════
workspace = 1, monitor:$mon1
workspace = 2, monitor:$mon2
workspace = 3, monitor:$mon3
workspace = 4, monitor:$mon4
workspace = 5, monitor:$mon5
workspace = 6, monitor:$mon6
workspace = 7, monitor:$mon7

# Overflow workspaces (cycle back to first monitors)
workspace = 8, monitor:$mon1
workspace = 9, monitor:$mon2
workspace = 10, monitor:$mon3

# ═══════════════════════════════════════════════════════════════════════
# Input configuration
# ═══════════════════════════════════════════════════════════════════════
input {
    kb_layout = us
    repeat_delay = 250
    repeat_rate = 40

    touchpad {
        natural_scroll = true
        disable_while_typing = true
    }
}

# ═══════════════════════════════════════════════════════════════════════
# Appearance — Snazzy-on-Black palette
#   Blue #57c7ff   Magenta #ff6ac1   Green #5af78e
#   Yellow #f3f99d  Red #ff5c57      Gray #686868   Dark #1a1b26
# ═══════════════════════════════════════════════════════════════════════
general {
    gaps_in = 8
    gaps_out = 8
    border_size = 2
    col.active_border = rgb(57c7ff)
    col.inactive_border = rgb(686868)
    layout = dwindle
}

decoration {
    rounding = 8

    blur {
        enabled = false
    }

    shadow {
        enabled = false
    }
}

animations {
    enabled = true
    bezier = snappy, 0.05, 0.9, 0.1, 1.0
    animation = windows, 1, 3, snappy
    animation = windowsOut, 1, 3, snappy, popin 80%
    animation = fade, 1, 3, snappy
    animation = workspaces, 1, 3, snappy
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

xwayland {
    force_zero_scaling = true
}

# ═══════════════════════════════════════════════════════════════════════
# Window rules
# ═══════════════════════════════════════════════════════════════════════

# Force all alacritty windows to start without title bar
windowrulev2 = noborder, class:^(Alacritty)$

# Floating windows
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, title:^(quick-terminal)$
windowrulev2 = size 800 500, title:^(quick-terminal)$

# ═══════════════════════════════════════════════════════════════════════
# Keybindings — window management
# ═══════════════════════════════════════════════════════════════════════

# Launch terminal
bind = $mod, Return, exec, alacritty

# Kill focused window
bind = $mod SHIFT, Q, killactive,

# hjkl focus navigation
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r

# hjkl move window
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r

# Split direction
bind = $mod, V, togglesplit,
bind = $mod, B, pseudo,

# Fullscreen toggle
bind = $mod, F, fullscreen, 0

# Floating toggle
bind = $mod SHIFT, Space, togglefloating,

# Layout cycling (from AeroSpace alt-slash)
bind = $mod, Slash, togglesplit,

# Quick terminal (from AeroSpace backtick)
bind = $mod, Grave, exec, alacritty --title quick-terminal

# Shader keybinds (from AeroSpace)
bind = $mod SHIFT, S, exec, shader-random.sh
bind = $mod SHIFT, N, exec, shader-cycle.sh next
bind = $mod SHIFT, P, exec, shader-cycle.sh prev

# Workspace back-and-forth (from AeroSpace alt-tab)
bind = $mod, Tab, workspace, previous

# Reload config
bind = $mod SHIFT, R, exec, /usr/local/bin/compositor-cmd.sh reload

# ═══════════════════════════════════════════════════════════════════════
# Workspace navigation
# ═══════════════════════════════════════════════════════════════════════
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move container to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7

# ═══════════════════════════════════════════════════════════════════════
# Resize mode — Mod+R enters, Escape/Return exits
# ═══════════════════════════════════════════════════════════════════════
bind = $mod, R, submap, resize
submap = resize
binde = , H, resizeactive, -20 0
binde = , J, resizeactive, 0 20
binde = , K, resizeactive, 0 -20
binde = , L, resizeactive, 20 0
bind = , Escape, submap, reset
bind = , Return, submap, reset
submap = reset

# ═══════════════════════════════════════════════════════════════════════
# Mouse bindings
# ═══════════════════════════════════════════════════════════════════════
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ═══════════════════════════════════════════════════════════════════════
# Auto-start
# ═══════════════════════════════════════════════════════════════════════

# Status bar
exec-once = waybar

# Primary control surface: ralphglasses TUI on workspace 1
exec-once = hyprctl dispatch workspace 1 && alacritty -e ralphglasses --scan-path /workspace
