# i3blocks config for ralphglasses thin client
#
# Fleet observability blocks — each calls rg-status-bar.sh with a segment flag.
# These mirror the SketchyBar rg.* items from the macOS dotfiles setup.
#
# TODO: Implement rg-status-bar.sh (see distro/scripts/rg-status-bar.sh)
# TODO: Tune interval (30 = seconds between refreshes, matches macOS SketchyBar update_freq)
# TODO: Consider reading from a cache file populated by rg-status-bar.timer
#       instead of calling the binary directly (avoids blocking the bar)
# TODO: Add click handlers for drill-down (e.g., open TUI on specific tab)

[rg-fleet]
command=rg-status-bar.sh --segment fleet
interval=30
label=
color=#5af78e
# Shows: ↻3 ✓12 ✗1 (running/completed/failed counts)

[rg-loops]
command=rg-status-bar.sh --segment loops
interval=30
label=
color=#ff6ac1
# Shows: 24 runs 87% converge

[rg-cost]
command=rg-status-bar.sh --segment cost
interval=30
label=
color=#5af78e
# Shows: $14.52

[rg-models]
command=rg-status-bar.sh --segment models
interval=30
label=󰧑
color=#f3f99d
# Shows: o1p:8 o4m:5 son:3

[rg-repos]
command=rg-status-bar.sh --segment repos
interval=30
label=
color=#57c7ff
# Shows: 12 scan 8 tgt

[rg-iters]
command=rg-status-bar.sh --segment iters
interval=30
label=󰔚
color=#686868
# Shows: 142 iters ~5.9/run
