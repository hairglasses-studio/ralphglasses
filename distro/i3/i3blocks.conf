# i3blocks config for ralphglasses thin client
#
# Fleet observability blocks — each reads from /tmp/rg-status.json cache
# populated by rg-status-bar.timer (30s). Mirrors the SketchyBar rg.* items
# from the macOS dotfiles setup.
#
# Cache architecture: systemd timer handles slow MCP calls; i3blocks reads
# the cached result instantly so the bar never freezes.

separator=false
markup=pango

[rg-fleet]
command=/opt/ralphglasses/distro/scripts/rg-status-bar.sh --segment fleet
interval=30
label=
# Shows: ↻3 ✓12 ✗1 (running/completed/failed counts)

[rg-loops]
command=/opt/ralphglasses/distro/scripts/rg-status-bar.sh --segment loops
interval=30
label=
# Shows: 24 runs 87%

[rg-cost]
command=/opt/ralphglasses/distro/scripts/rg-status-bar.sh --segment cost
interval=30
label=
# Shows: $14.52

[rg-models]
command=/opt/ralphglasses/distro/scripts/rg-status-bar.sh --segment models
interval=30
label=󰧑
# Shows: o1p:8 o4m:5 son:3

[rg-repos]
command=/opt/ralphglasses/distro/scripts/rg-status-bar.sh --segment repos
interval=30
label=
# Shows: 12 scan 8 tgt

[rg-iters]
command=/opt/ralphglasses/distro/scripts/rg-status-bar.sh --segment iters
interval=30
separator=true
label=󰔚
# Shows: 142 iters ~5.9/run
