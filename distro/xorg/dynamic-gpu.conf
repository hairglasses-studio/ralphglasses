# dynamic-gpu.conf — Xorg template for ralphglasses thin client
#
# Multi-GPU layout for 7 monitors across dual NVIDIA RTX 4090 GPUs.
# Generated at install time by distro/scripts/gen-xorg.sh.
#
# Hardware: ASUS ProArt X870E-CREATOR WIFI
# See: distro/hardware/proart-x870e.md
#
# Placeholders (replaced by gen-xorg.sh):
#   @@GPU0_BUSID@@  — PCI BusID of first NVIDIA GPU  (e.g., PCI:1:0:0)
#   @@GPU1_BUSID@@  — PCI BusID of second NVIDIA GPU (e.g., PCI:2:0:0)
#
# Single-GPU mode: gen-xorg.sh emits only the gpu0 Device/Screen/Monitor
# sections and assigns all 7 monitors to that one GPU.

# =============================================================================
# ServerLayout — ties screens together into a single logical desktop
# =============================================================================

# Dual-GPU layout: GPU0 drives screens 0-3, GPU1 drives screens 4-6
Section "ServerLayout"
    Identifier  "layout-dual"
    Screen   0  "screen0" 0    0
    Screen   1  "screen1" RightOf "screen0"
    Screen   2  "screen2" RightOf "screen1"
    Screen   3  "screen3" RightOf "screen2"
    Screen   4  "screen4" RightOf "screen3"
    Screen   5  "screen5" RightOf "screen4"
    Screen   6  "screen6" RightOf "screen5"
    Option      "Xinerama" "on"
EndSection

# Single-GPU fallback: all 7 monitors on GPU0
Section "ServerLayout"
    Identifier  "layout-single"
    Screen   0  "screen0" 0    0
    Screen   1  "screen1" RightOf "screen0"
    Screen   2  "screen2" RightOf "screen1"
    Screen   3  "screen3" RightOf "screen2"
    Screen   4  "screen4" RightOf "screen3"
    Screen   5  "screen5" RightOf "screen4"
    Screen   6  "screen6" RightOf "screen5"
    Option      "Xinerama" "on"
EndSection

# =============================================================================
# ServerFlags
# =============================================================================

Section "ServerFlags"
    Option "DefaultServerLayout" "layout-dual"
    Option "BlankTime"  "0"
    Option "StandbyTime" "0"
    Option "SuspendTime" "0"
    Option "OffTime"     "0"
    # Disable DPMS — thin client displays should never sleep
    Option "DPMS"        "false"
EndSection

# =============================================================================
# GPU Devices
# =============================================================================

Section "Device"
    Identifier  "gpu0"
    Driver      "nvidia"
    BusID       "@@GPU0_BUSID@@"
    Option      "AllowEmptyInitialConfiguration" "true"
    Option      "Coolbits" "28"
    Option      "TripleBuffer" "true"
    # Screen 0 — first output on GPU0
    Screen      0
EndSection

Section "Device"
    Identifier  "gpu0-screen1"
    Driver      "nvidia"
    BusID       "@@GPU0_BUSID@@"
    Option      "AllowEmptyInitialConfiguration" "true"
    Screen      1
EndSection

Section "Device"
    Identifier  "gpu0-screen2"
    Driver      "nvidia"
    BusID       "@@GPU0_BUSID@@"
    Option      "AllowEmptyInitialConfiguration" "true"
    Screen      2
EndSection

Section "Device"
    Identifier  "gpu0-screen3"
    Driver      "nvidia"
    BusID       "@@GPU0_BUSID@@"
    Option      "AllowEmptyInitialConfiguration" "true"
    Screen      3
EndSection

# GPU1 — second RTX 4090 (dual-GPU mode only)
Section "Device"
    Identifier  "gpu1"
    Driver      "nvidia"
    BusID       "@@GPU1_BUSID@@"
    Option      "AllowEmptyInitialConfiguration" "true"
    Option      "Coolbits" "28"
    Option      "TripleBuffer" "true"
    Screen      0
EndSection

Section "Device"
    Identifier  "gpu1-screen1"
    Driver      "nvidia"
    BusID       "@@GPU1_BUSID@@"
    Option      "AllowEmptyInitialConfiguration" "true"
    Screen      1
EndSection

Section "Device"
    Identifier  "gpu1-screen2"
    Driver      "nvidia"
    BusID       "@@GPU1_BUSID@@"
    Option      "AllowEmptyInitialConfiguration" "true"
    Screen      2
EndSection

# =============================================================================
# Monitors — one per physical display
# =============================================================================

Section "Monitor"
    Identifier  "monitor0"
    Option      "DPMS" "false"
    Option      "Primary" "true"
EndSection

Section "Monitor"
    Identifier  "monitor1"
    Option      "DPMS" "false"
EndSection

Section "Monitor"
    Identifier  "monitor2"
    Option      "DPMS" "false"
EndSection

Section "Monitor"
    Identifier  "monitor3"
    Option      "DPMS" "false"
EndSection

Section "Monitor"
    Identifier  "monitor4"
    Option      "DPMS" "false"
EndSection

Section "Monitor"
    Identifier  "monitor5"
    Option      "DPMS" "false"
EndSection

Section "Monitor"
    Identifier  "monitor6"
    Option      "DPMS" "false"
EndSection

# =============================================================================
# Screens — bind Device + Monitor pairs
# =============================================================================

# GPU0 screens (0-3)
Section "Screen"
    Identifier  "screen0"
    Device      "gpu0"
    Monitor     "monitor0"
    DefaultDepth 24
    SubSection "Display"
        Depth   24
    EndSubSection
EndSection

Section "Screen"
    Identifier  "screen1"
    Device      "gpu0-screen1"
    Monitor     "monitor1"
    DefaultDepth 24
    SubSection "Display"
        Depth   24
    EndSubSection
EndSection

Section "Screen"
    Identifier  "screen2"
    Device      "gpu0-screen2"
    Monitor     "monitor2"
    DefaultDepth 24
    SubSection "Display"
        Depth   24
    EndSubSection
EndSection

Section "Screen"
    Identifier  "screen3"
    Device      "gpu0-screen3"
    Monitor     "monitor3"
    DefaultDepth 24
    SubSection "Display"
        Depth   24
    EndSubSection
EndSection

# GPU1 screens (4-6) — dual-GPU mode only
Section "Screen"
    Identifier  "screen4"
    Device      "gpu1"
    Monitor     "monitor4"
    DefaultDepth 24
    SubSection "Display"
        Depth   24
    EndSubSection
EndSection

Section "Screen"
    Identifier  "screen5"
    Device      "gpu1-screen1"
    Monitor     "monitor5"
    DefaultDepth 24
    SubSection "Display"
        Depth   24
    EndSubSection
EndSection

Section "Screen"
    Identifier  "screen6"
    Device      "gpu1-screen2"
    Monitor     "monitor6"
    DefaultDepth 24
    SubSection "Display"
        Depth   24
    EndSubSection
EndSection
