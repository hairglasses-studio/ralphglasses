# overlay.conf — OverlayFS persistent storage for ralphglasses PXE clients
#
# PXE-booted thin clients use a read-only root (NFS or squashfs). This
# configuration defines OverlayFS mounts that provide writable layers on
# top of the read-only base, enabling session state, logs, and user data
# to persist across reboots when backed by local storage.
#
# Integration:
#   - Loaded by distro/scripts/pxe-overlay-mount.sh at boot (via systemd)
#   - Falls back to tmpfs (RAM) when no local disk is detected
#   - The ralphglasses.pxe=1 kernel param activates overlay mode
#
# Format: mount_point:size_limit:persist
#   mount_point — absolute path to overlay
#   size_limit  — tmpfs size limit (ignored when backed by disk)
#   persist     — "yes" to use local disk if available, "no" for tmpfs only

# ── ralphglasses runtime state ────────────────────────────────────────
# Session logs, .ralph/ cycle data, scratchpads, MCP state
/home/ralph/.ralph:512M:yes

# ── Workspace for cloned repos ────────────────────────────────────────
# Agent working directories, git worktrees
/workspace:4G:yes

# ── System logs ───────────────────────────────────────────────────────
# journald, dnsmasq, nginx logs survive reboot for debugging
/var/log:256M:yes

# ── Temporary files ───────────────────────────────────────────────────
# Build artifacts, pip/npm caches — always tmpfs, never persist
/tmp:2G:no

# ── User config ───────────────────────────────────────────────────────
# i3 config, alacritty, shell history, SSH keys
/home/ralph/.config:128M:yes
/home/ralph/.ssh:16M:yes
/home/ralph/.bash_history:1M:yes

# ── Go module cache ──────────────────────────────────────────────────
# Avoid re-downloading modules on every boot
/home/ralph/go:1G:yes

# ── Claude Code / LLM provider state ─────────────────────────────────
# API key caches, conversation history, MCP server state
/home/ralph/.claude:64M:yes
/home/ralph/.config/claude:32M:yes

# ── Tailscale state ──────────────────────────────────────────────────
# Node identity persists so the machine keeps its Tailscale IP
/var/lib/tailscale:64M:yes

# ── NetworkManager connections ────────────────────────────────────────
# Saved wired/wifi profiles
/etc/NetworkManager/system-connections:8M:yes

# ── NVIDIA persistence ───────────────────────────────────────────────
# X11 config overrides, autorandr profiles
/etc/X11/xorg.conf.d:4M:yes
/home/ralph/.config/autorandr:8M:yes
