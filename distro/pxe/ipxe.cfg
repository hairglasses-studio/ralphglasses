#!ipxe
# ipxe.cfg — iPXE boot script for ralphglasses thin clients
#
# Chainloads kernel + initrd from TFTP or HTTP, passes root filesystem
# parameters for NFS or squashfs-over-HTTP boot. Supports both BIOS
# and UEFI firmware.
#
# Served by: dnsmasq TFTP (see ltsp-setup.sh)
# Hardware:  ASUS ProArt X870E-CREATOR WIFI, Ryzen 9 7950X, RTX 4090

# ── Server configuration ─────────────────────────────────────────────
set server-ip ${next-server}
set boot-url http://${server-ip}:8080
set nfs-path ${server-ip}:/srv/ltsp/images/ralphglasses

# ── Retry / timeout ──────────────────────────────────────────────────
set retry-count 0
set max-retries 5
set boot-timeout 10000

# ── Network setup ─────────────────────────────────────────────────────
:net_config
dhcp || goto retry_dhcp
echo iPXE: DHCP OK — IP ${ip} / GW ${gateway} / DNS ${dns}
goto menu

:retry_dhcp
iseq ${retry-count} ${max-retries} && goto shell ||
inc retry-count
echo iPXE: DHCP failed, retry ${retry-count}/${max-retries}...
sleep 3
goto net_config

# ── Boot menu ─────────────────────────────────────────────────────────
:menu
menu ralphglasses PXE Boot
item --gap --             --- Network Boot Options ---
item live                 Boot ralphglasses (NVIDIA, live NFS)
item live-http            Boot ralphglasses (NVIDIA, squashfs HTTP)
item live-igpu            Boot ralphglasses (AMD iGPU)
item headless             Boot ralphglasses (headless / serial)
item --gap --             --- Utilities ---
item shell                Drop to iPXE shell
item reboot               Reboot
choose --timeout ${boot-timeout} --default live selected || goto shell
goto ${selected}

# ── NVIDIA live (NFS root) ───────────────────────────────────────────
:live
echo Booting ralphglasses via NFS...
kernel ${boot-url}/vmlinuz || goto fail
initrd ${boot-url}/initrd.img || goto fail
imgargs vmlinuz \
    boot=live \
    netboot=nfs \
    nfsroot=${nfs-path} \
    ip=dhcp \
    ro \
    quiet splash \
    nvidia-drm.modeset=1 \
    systemd.unit=graphical.target \
    overlayroot=tmpfs \
    ralphglasses.pxe=1
boot || goto fail

# ── NVIDIA live (squashfs over HTTP) ─────────────────────────────────
:live-http
echo Booting ralphglasses via HTTP squashfs...
kernel ${boot-url}/vmlinuz || goto fail
initrd ${boot-url}/initrd.img || goto fail
imgargs vmlinuz \
    boot=live \
    netboot=nfs \
    nfsroot=${nfs-path} \
    fetch=${boot-url}/filesystem.squashfs \
    ip=dhcp \
    ro \
    quiet splash \
    nvidia-drm.modeset=1 \
    systemd.unit=graphical.target \
    toram \
    overlayroot=tmpfs \
    ralphglasses.pxe=1
boot || goto fail

# ── AMD iGPU ─────────────────────────────────────────────────────────
:live-igpu
echo Booting ralphglasses (AMD iGPU)...
kernel ${boot-url}/vmlinuz || goto fail
initrd ${boot-url}/initrd.img || goto fail
imgargs vmlinuz \
    boot=live \
    netboot=nfs \
    nfsroot=${nfs-path} \
    ip=dhcp \
    ro \
    quiet splash \
    amdgpu.dc=1 \
    systemd.unit=graphical.target \
    overlayroot=tmpfs \
    ralphglasses.pxe=1
boot || goto fail

# ── Headless / serial console ────────────────────────────────────────
:headless
echo Booting ralphglasses (headless, serial)...
kernel ${boot-url}/vmlinuz || goto fail
initrd ${boot-url}/initrd.img || goto fail
imgargs vmlinuz \
    boot=live \
    netboot=nfs \
    nfsroot=${nfs-path} \
    ip=dhcp \
    ro \
    quiet splash \
    console=tty0 console=ttyS0,115200n8 \
    systemd.unit=multi-user.target \
    overlayroot=tmpfs \
    ralphglasses.pxe=1
boot || goto fail

# ── iPXE shell ────────────────────────────────────────────────────────
:shell
echo Dropping to iPXE shell. Type 'exit' to return to menu.
shell
goto menu

# ── Reboot ────────────────────────────────────────────────────────────
:reboot
reboot

# ── Failure handler ───────────────────────────────────────────────────
:fail
echo
echo *** Boot failed ***
echo Check server ${server-ip} is reachable and serving kernel/initrd.
echo
prompt Press any key to return to menu...
goto menu
