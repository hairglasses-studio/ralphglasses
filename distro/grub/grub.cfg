# GRUB configuration for ralphglasses bootable ISO
# UEFI boot menu

set timeout=5
set default=0

# Detect if booting via EFI
if [ "${grub_platform}" = "efi" ]; then
    insmod efi_gop
    insmod efi_uga
fi

insmod gfxterm
insmod all_video
set gfxmode=auto
terminal_output gfxterm

# Colors
set menu_color_normal=light-gray/black
set menu_color_highlight=white/dark-gray

menuentry "ralphglasses (NVIDIA, live)" {
    linux /live/vmlinuz boot=live toram quiet splash \
        nvidia-drm.modeset=1 \
        systemd.unit=graphical.target
    initrd /live/initrd.img
}

menuentry "ralphglasses (NVIDIA, live, verbose)" {
    linux /live/vmlinuz boot=live toram \
        nvidia-drm.modeset=1 \
        systemd.unit=graphical.target
    initrd /live/initrd.img
}

menuentry "ralphglasses (nomodeset, safe graphics)" {
    linux /live/vmlinuz boot=live toram quiet splash nomodeset \
        systemd.unit=graphical.target
    initrd /live/initrd.img
}

menuentry "Install ralphglasses to disk" {
    linux /live/vmlinuz boot=live toram quiet splash \
        nvidia-drm.modeset=1 \
        systemd.unit=graphical.target \
        ralphglasses.install=1
    initrd /live/initrd.img
}

menuentry "System setup (UEFI firmware)" {
    fwsetup
}
