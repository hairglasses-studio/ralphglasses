site_name: ralphglasses
site_description: Command-and-control TUI for parallel multi-LLM agent fleets
site_url: https://hairglasses-studio.github.io/ralphglasses/
repo_url: https://github.com/hairglasses-studio/ralphglasses
repo_name: hairglasses-studio/ralphglasses
docs_dir: .

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: pink
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: pink
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture-diagrams.md
  - MCP Tools: MCP-TOOLS.md
  - Provider Setup: PROVIDER-SETUP.md
  - Multi-Tenant: MULTI-TENANT.md
  - Marathon: MARATHON.md
  - Autonomy: AUTONOMY.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
