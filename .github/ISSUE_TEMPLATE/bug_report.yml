name: Bug Report
description: Report a concrete defect with reproduction details.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal steps to reproduce.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: User-facing, operational, or security impact.
