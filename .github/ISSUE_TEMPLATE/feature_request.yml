name: Feature Request
description: Propose a new capability or standards change.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What gap are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the change and constraints.
    validations:
      required: true
  - type: textarea
    id: rollout
    attributes:
      label: Rollout Notes
      description: Repo scope, risk, and migration notes.
