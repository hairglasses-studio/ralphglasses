name: Codex MCP Inventory

on:
  workflow_dispatch:
    inputs:
      inventory_scope:
        description: "Which MCP surfaces Codex should inventory"
        required: false
        default: "Ralphglasses MCP server, plugin bundle, and command-and-control docs"
        type: string

jobs:
  codex-mcp-inventory:
    uses: hairglasses-studio/.github/.github/workflows/codex-mcp-inventory.yml@84851d48a4c35aa4fa936b1fd247f7dcd37421cf
    with:
      inventory_scope: ${{ github.event.inputs.inventory_scope }}
    secrets: inherit
