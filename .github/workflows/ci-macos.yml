name: CI (macOS)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-macos-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  macos-validate:
    uses: ./.github/workflows/reusable-ci-macos.yml
