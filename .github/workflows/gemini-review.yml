name: Gemini Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - '*.md'
      - '**/*.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to review"
        required: true
        type: string
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: gemini-review-${{ github.event.pull_request.number || github.event.issue.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  gemini-review:
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@gemini')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@gemini'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      summary: ${{ steps.run_gemini.outputs.summary }}
      pr_number: ${{ steps.pr.outputs.number }}
    steps:
      - name: Resolve PR metadata
        id: pr
        uses: actions/github-script@v8
        with:
          github-token: ${{ github.token }}
          script: |
            const trusted = new Set(['OWNER', 'MEMBER', 'COLLABORATOR']);
            const eventName = context.eventName;
            const body = context.payload.comment?.body || '';
            const prNumber =
              context.payload.pull_request?.number ||
              (context.payload.issue?.pull_request ? context.payload.issue.number : undefined) ||
              Number(context.payload.inputs?.pr_number || 0);
            if (!prNumber) {
              core.setOutput('should_run', 'false');
              return;
            }
            const {data: pr} = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const association = (context.payload.comment?.author_association || '').toUpperCase();
            const isTrusted =
              eventName === 'pull_request' ||
              eventName === 'workflow_dispatch' ||
              trusted.has(association);
            const requested =
              eventName === 'pull_request' ||
              eventName === 'workflow_dispatch' ||
              body.includes('@gemini');
            const sameRepo = pr.head.repo.full_name === `${context.repo.owner}/${context.repo.repo}`;
            core.setOutput('number', String(prNumber));
            core.setOutput('same_repo', String(sameRepo));
            core.setOutput('draft', String(Boolean(pr.draft)));
            core.setOutput('trusted', String(isTrusted));
            core.setOutput('should_run', String(Boolean(sameRepo && !pr.draft && isTrusted && requested)));

      - uses: actions/checkout@v6
        if: steps.pr.outputs.should_run == 'true'
        with:
          fetch-depth: 0
          ref: refs/pull/${{ steps.pr.outputs.number }}/merge

      - name: Pre-fetch PR refs
        if: steps.pr.outputs.should_run == 'true'
        run: git fetch --no-tags origin +refs/pull/${{ steps.pr.outputs.number }}/head

      - name: Run Gemini review
        id: run_gemini
        if: steps.pr.outputs.should_run == 'true'
        uses: google-github-actions/run-gemini-cli@v0.1.15
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            Review the pull request changes for correctness, regressions, missing tests, and maintainability.
            Focus on concrete findings only. Be concise and specific.

            Pull request number:
            ${{ steps.pr.outputs.number }}

            Event:
            ${{ github.event_name }}

  post-feedback:
    runs-on: ubuntu-latest
    needs: gemini-review
    if: needs.gemini-review.outputs.summary != ''
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Report Gemini feedback
        uses: actions/github-script@v8
        env:
          GEMINI_SUMMARY: ${{ needs.gemini-review.outputs.summary }}
          PR_NUMBER: ${{ needs.gemini-review.outputs.pr_number }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: process.env.GEMINI_SUMMARY,
            });
