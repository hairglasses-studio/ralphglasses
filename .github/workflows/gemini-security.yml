name: Gemini Security Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - '*.md'
      - '**/*.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to review"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: gemini-security-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  security-review:
    if: |
      (
        github.event_name == 'pull_request' &&
        !github.event.pull_request.draft &&
        github.actor != 'dependabot[bot]'
      ) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      summary: ${{ steps.run_gemini.outputs.summary }}
      pr_number: ${{ steps.pr.outputs.number }}
    steps:
      - name: Resolve PR metadata
        id: pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const prNumber =
              context.payload.pull_request?.number
              || Number(context.payload.inputs?.pr_number);
            if (!prNumber) {
              core.setFailed('unable to resolve pull request number');
              return;
            }
            const {data: pr} = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            core.setOutput('number', String(prNumber));
            core.setOutput('same_repo', String(pr.head.repo.full_name === `${context.repo.owner}/${context.repo.repo}`));
            core.setOutput('draft', String(Boolean(pr.draft)));

      - uses: actions/checkout@v6
        if: steps.pr.outputs.same_repo == 'true' && steps.pr.outputs.draft != 'true'
        with:
          fetch-depth: 0
          ref: refs/pull/${{ steps.pr.outputs.number }}/merge

      - name: Pre-fetch PR refs
        if: steps.pr.outputs.same_repo == 'true' && steps.pr.outputs.draft != 'true'
        run: |
          git fetch --no-tags origin +refs/pull/${{ steps.pr.outputs.number }}/head

      - name: Run Gemini security review
        id: run_gemini
        if: steps.pr.outputs.same_repo == 'true' && steps.pr.outputs.draft != 'true'
        uses: google-github-actions/run-gemini-cli@v0.1.15
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            Review pull request #${{ steps.pr.outputs.number }} for security issues only.

            Look for:
            - injection vulnerabilities
            - authentication or authorization flaws
            - secret exposure
            - unsafe file or path handling
            - SSRF, request smuggling, open redirects, or similar request-handling flaws
            - race conditions with security impact

            Return an empty response if you do not find a concrete security issue.

  post-feedback:
    runs-on: ubuntu-latest
    needs: security-review
    if: needs.security-review.outputs.summary != ''
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Report Gemini security feedback
        uses: actions/github-script@v7
        env:
          GEMINI_SUMMARY: ${{ needs.security-review.outputs.summary }}
          PR_NUMBER: ${{ needs.security-review.outputs.pr_number }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: process.env.GEMINI_SUMMARY,
            });
