name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go-tests:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test with race detector
        run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage report
        run: go tool cover -func=coverage.out | tail -1

      - name: Build binary
        run: go build -o ralphglasses ./...

      - name: Check binary size
        run: |
          SIZE=$(stat -c%s ralphglasses)
          echo "Binary size: ${SIZE} bytes ($(( SIZE / 1024 / 1024 ))MB)"

      - name: Upload coverage artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 14

  go-fuzz:
    name: Fuzz Tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Fuzz config parser
        run: go test -fuzz=FuzzLoadConfig -fuzztime=30s ./internal/model/

      - name: Fuzz status parser
        run: go test -fuzz=FuzzLoadStatus -fuzztime=30s ./internal/model/

      - name: Fuzz circuit breaker parser
        run: go test -fuzz=FuzzLoadCircuitBreaker -fuzztime=30s ./internal/model/

      - name: Fuzz progress parser
        run: go test -fuzz=FuzzLoadProgress -fuzztime=30s ./internal/model/

      - name: Fuzz MCP string args
        run: go test -fuzz=FuzzGetStringArg -fuzztime=30s ./internal/mcpserver/

      - name: Fuzz MCP number args
        run: go test -fuzz=FuzzGetNumberArg -fuzztime=30s ./internal/mcpserver/

  go-benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run benchmarks
        run: go test -bench=. -benchmem -count=3 ./... | tee bench.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks
          path: bench.txt

  script-tests:
    name: Shell Script Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: sudo apt-get install -y bats

      - name: Run BATS tests
        run: bats scripts/test/
