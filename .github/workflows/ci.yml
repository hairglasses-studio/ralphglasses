name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go-tests:
    name: Bootstrap-Aware CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install system prerequisites
        run: sudo apt-get update && sudo apt-get install -y make build-essential shellcheck bats

      - name: Bootstrap toolchain
        run: ./scripts/bootstrap-toolchain.sh

      - name: Doctor
        run: ./scripts/dev/doctor.sh --strict

      - name: CI
        run: ./scripts/dev/ci.sh

      - name: Coverage report
        run: ./scripts/dev/go.sh tool cover -func=coverage.out | tail -1 || true

      - name: Coverage threshold enforcement
        run: ./scripts/dev/check-coverage.sh coverage.out

      - name: Build binary
        run: ./scripts/dev/go.sh build -o ralphglasses ./...

      - name: Check binary size
        run: |
          SIZE=$(stat -c%s ralphglasses)
          echo "Binary size: ${SIZE} bytes ($(( SIZE / 1024 / 1024 ))MB)"

      - name: Upload coverage artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 14

  self-test-gate:
    name: Self-Test Gate
    runs-on: ubuntu-latest
    needs: [go-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15
    env:
      RALPH_SELF_TEST: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install system prerequisites
        run: sudo apt-get update && sudo apt-get install -y make build-essential

      - name: Build binary
        run: go build -o ralphglasses ./...

      - name: Download previous baseline
        uses: actions/download-artifact@v4
        with:
          name: selftest-baseline
          path: .ralph/
        continue-on-error: true

      - name: Run gate check
        run: |
          ./ralphglasses selftest --gate --json > .ralph/gate_report.json || true
          if [ -f .ralph/gate_report.json ]; then
            VERDICT=$(jq -r '.overall // "skip"' .ralph/gate_report.json)
          else
            VERDICT="skip"
          fi
          echo "## Self-Test Gate: ${VERDICT}" >> "$GITHUB_STEP_SUMMARY"
          if [ "$VERDICT" = "fail" ]; then
            echo "::error::Self-test gate FAILED"
            exit 1
          fi

      - name: Upload baseline
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selftest-baseline
          path: .ralph/loop_baseline.json
          overwrite: true
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selftest-results
          path: .ralph/gate_report.json
          retention-days: 14
          if-no-files-found: ignore

  go-fuzz:
    name: Fuzz Tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install system prerequisites
        run: sudo apt-get update && sudo apt-get install -y make build-essential

      - name: Fuzz config parser
        run: ./scripts/dev/go.sh test -fuzz=FuzzLoadConfig -fuzztime=30s ./internal/model/

      - name: Fuzz status parser
        run: ./scripts/dev/go.sh test -fuzz=FuzzLoadStatus -fuzztime=30s ./internal/model/

      - name: Fuzz circuit breaker parser
        run: ./scripts/dev/go.sh test -fuzz=FuzzLoadCircuitBreaker -fuzztime=30s ./internal/model/

      - name: Fuzz progress parser
        run: ./scripts/dev/go.sh test -fuzz=FuzzLoadProgress -fuzztime=30s ./internal/model/

      - name: Fuzz MCP string args
        run: ./scripts/dev/go.sh test -fuzz=FuzzGetStringArg -fuzztime=30s ./internal/mcpserver/

      - name: Fuzz MCP number args
        run: ./scripts/dev/go.sh test -fuzz=FuzzGetNumberArg -fuzztime=30s ./internal/mcpserver/

  go-benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install system prerequisites
        run: sudo apt-get update && sudo apt-get install -y make build-essential

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Download previous benchmark
        uses: actions/download-artifact@v4
        with:
          name: benchmarks
          path: bench-prev
        continue-on-error: true

      - name: Run benchmarks
        run: ./scripts/dev/go.sh test -bench=. -benchmem -count=3 ./... | tee bench.txt

      - name: Compare with previous run
        if: hashFiles('bench-prev/bench.txt') != ''
        run: |
          echo "## Benchmark Comparison" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          benchstat bench-prev/bench.txt bench.txt | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Generate benchmark dashboard
        run: |
          if [ -f bench-prev/bench.txt ]; then
            bash scripts/bench-dashboard.sh bench-prev/bench.txt bench.txt >> "$GITHUB_STEP_SUMMARY"
          else
            bash scripts/bench-dashboard.sh bench.txt >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks
          path: bench.txt
          overwrite: true

  go-lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  script-tests:
    name: Shell Script Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install prerequisites
        run: sudo apt-get update && sudo apt-get install -y bats shellcheck

      - name: Run BATS tests
        run: bats scripts/test/

  grub-validate:
    name: Validate grub.cfg
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate grub.cfg menuentry blocks and kernel paths
        run: bash distro/scripts/validate-grub.sh distro/grub/grub.cfg
