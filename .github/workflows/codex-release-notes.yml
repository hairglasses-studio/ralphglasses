name: Codex Release Notes

on:
  workflow_dispatch:
    inputs:
      base_ref:
        description: "Base ref or tag for the release range"
        required: true
        type: string
      head_ref:
        description: "Head ref or tag for the release range"
        required: false
        default: "HEAD"
        type: string
      release_title:
        description: "Optional release title hint"
        required: false
        default: ""
        type: string

jobs:
  codex-release-notes:
    uses: hairglasses-studio/.github/.github/workflows/codex-release-notes.yml@84851d48a4c35aa4fa936b1fd247f7dcd37421cf
    with:
      base_ref: ${{ github.event.inputs.base_ref }}
      head_ref: ${{ github.event.inputs.head_ref }}
      release_title: ${{ github.event.inputs.release_title }}
    secrets: inherit
