name: Gemini Structured Audit

on:
  workflow_dispatch:
    inputs:
      audit_scope:
        description: "What Gemini should audit"
        required: true
        default: "Repository migration and operational risk audit"
        type: string

permissions:
  contents: read

jobs:
  gemini-structured-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gemini structured audit
        id: run_gemini
        uses: google-github-actions/run-gemini-cli@v0.1.21
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            Audit scope:
            ${{ github.event.inputs.audit_scope }}

            Focus on concrete, source-backed findings only.
            Return a JSON object conforming strictly to the following schema:
            {
              "type": "object",
              "required": ["summary", "scope", "findings", "next_steps", "follow_up_questions"],
              "properties": {
                "summary": { "type": "string" },
                "scope": { "type": "string" },
                "findings": {
                  "type": "array",
                  "items": {
                    "type": "object",
                    "required": ["severity", "title", "file", "evidence", "recommendation"],
                    "properties": {
                      "severity": {
                        "type": "string",
                        "enum": ["critical", "high", "medium", "low"]
                      },
                      "title": { "type": "string" },
                      "file": { "type": "string" },
                      "evidence": { "type": "string" },
                      "recommendation": { "type": "string" }
                    }
                  }
                },
                "next_steps": {
                  "type": "array",
                  "items": { "type": "string" }
                },
                "follow_up_questions": {
                  "type": "array",
                  "items": { "type": "string" }
                }
              }
            }

      - name: Save structured audit artifact
        env:
          GEMINI_FINAL_MESSAGE: ${{ steps.run_gemini.outputs.summary }}
        run: |
          printf '%s\n' "$GEMINI_FINAL_MESSAGE" > gemini-structured-audit.json
          jq . gemini-structured-audit.json >/dev/null
          jq '{
            summary,
            scope,
            findings_count: (.findings | length),
            critical_findings: ([.findings[] | select(.severity == "critical")] | length),
            high_findings: ([.findings[] | select(.severity == "high")] | length),
            next_steps,
            follow_up_questions
          }' gemini-structured-audit.json > gemini-structured-audit-summary.json

      - name: Upload structured audit
        uses: actions/upload-artifact@v4
        with:
          name: gemini-structured-audit
          path: |
            gemini-structured-audit.json
            gemini-structured-audit-summary.json