name: Claude Security Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - '*.md'
      - '**/*.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'

permissions:
  contents: read
  pull-requests: write
  security-events: write
  id-token: write

concurrency:
  group: claude-security-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  security-review:
    if: |
      !github.event.pull_request.draft &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          trigger_phrase: "@claude-security"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--max-turns 5"
          prompt: |
            Focus exclusively on security concerns:
            - Injection vulnerabilities (SQL, command, XSS)
            - Authentication and authorization issues
            - Secret/credential exposure
            - Insecure dependencies
            - Path traversal and file access
            - Race conditions
            Only comment if you find actual security issues. Do not comment on style or general code quality.
