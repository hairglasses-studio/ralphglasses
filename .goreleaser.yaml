version: 2
project_name: ralphglasses

before:
  hooks:
    - go mod tidy

builds:
  - id: ralphglasses
    binary: ralphglasses
    main: ./cmd/ralphglasses
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/hairglasses-studio/ralphglasses/cmd.version={{.Version}}
      - -X github.com/hairglasses-studio/ralphglasses/cmd.commit={{.ShortCommit}}
  - id: ralphglasses-godview
    binary: ralphglasses-godview
    main: ./cmd/ralphglasses-godview
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  algorithm: sha256

release:
  github:
    owner: hairglasses-studio
    name: ralphglasses
