version: 2

project_name: ralphglasses

before:
  hooks:
    - go mod tidy

builds:
  - id: ralphglasses
    main: .
    binary: ralphglasses
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/hairglasses-studio/ralphglasses/cmd.version={{.Version}}
      - -X github.com/hairglasses-studio/ralphglasses/cmd.commit={{.ShortCommit}}
      - -X github.com/hairglasses-studio/ralphglasses/cmd.buildDate={{.Date}}
    env:
      - CGO_ENABLED=0
  - id: prompt-improver
    main: ./cmd/prompt-improver
    binary: prompt-improver
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

changelog:
  use: git
  sort: asc
  groups:
    - title: Features
      regexp: "^feat"
      order: 0
    - title: Bug Fixes
      regexp: "^fix"
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - "^chore"
      - "^docs"
      - "^test"
      - "Merge pull request"
      - "Merge branch"

dockers:
  - id: ralphglasses-amd64
    ids:
      - ralphglasses
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/hairglasses-studio/ralphglasses:{{ .Version }}-amd64"
      - "ghcr.io/hairglasses-studio/ralphglasses:latest-amd64"
    dockerfile: Dockerfile.goreleaser
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.source=https://github.com/hairglasses-studio/ralphglasses"
  - id: ralphglasses-arm64
    ids:
      - ralphglasses
    goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/hairglasses-studio/ralphglasses:{{ .Version }}-arm64"
      - "ghcr.io/hairglasses-studio/ralphglasses:latest-arm64"
    dockerfile: Dockerfile.goreleaser
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.source=https://github.com/hairglasses-studio/ralphglasses"

docker_manifests:
  - name_template: "ghcr.io/hairglasses-studio/ralphglasses:{{ .Version }}"
    image_templates:
      - "ghcr.io/hairglasses-studio/ralphglasses:{{ .Version }}-amd64"
      - "ghcr.io/hairglasses-studio/ralphglasses:{{ .Version }}-arm64"
  - name_template: "ghcr.io/hairglasses-studio/ralphglasses:latest"
    image_templates:
      - "ghcr.io/hairglasses-studio/ralphglasses:latest-amd64"
      - "ghcr.io/hairglasses-studio/ralphglasses:latest-arm64"

release:
  github:
    owner: hairglasses-studio
    name: ralphglasses
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} {{.Version}}"
