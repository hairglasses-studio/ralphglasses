version: 2

builds:
  - id: ralphglasses
    main: .
    binary: ralphglasses
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/hairglasses-studio/ralphglasses/cmd.version={{.Version}}
  - id: prompt-improver
    main: ./cmd/prompt-improver
    binary: prompt-improver
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

brews:
  - repository:
      owner: hairglasses-studio
      name: homebrew-tap
    homepage: https://github.com/hairglasses-studio/ralphglasses
    description: "TUI for parallel multi-LLM agent fleets"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
