name: e2e-validation
steps:
    - name: lint
      prompt: Run golangci-lint and fix any findings
      provider: claude
      model: sonnet
    - name: test
      prompt: Run go test ./... and fix any failures
      provider: claude
      model: sonnet
      depends_on:
        - lint
    - name: build
      prompt: Run go build ./... and verify binary
      provider: claude
      model: sonnet
      depends_on:
        - test
