{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ralphglasses.serviceAccountName" . }}
  labels:
    {{- include "ralphglasses.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "ralphglasses.fullname" . }}
  labels:
    {{- include "ralphglasses.labels" . | nindent 4 }}
rules:
  # RalphSession and RalphFleet CRD management
  - apiGroups:
      - ralphglasses.hairglasses.studio
    resources:
      - ralphsessions
      - ralphsessions/status
      - ralphfleets
      - ralphfleets/status
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # Pod lifecycle for session pods
  - apiGroups:
      - ""
    resources:
      - pods
      - pods/log
    verbs:
      - get
      - list
      - watch
      - create
      - delete
  # Secrets (read-only, for API key verification)
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
  # ConfigMaps (operator config and session config)
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - list
      - watch
      - create
      - update
  # Events for status reporting
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
  # Leases for leader election
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "ralphglasses.fullname" . }}
  labels:
    {{- include "ralphglasses.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "ralphglasses.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "ralphglasses.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
