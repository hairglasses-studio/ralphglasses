apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: ralphglasses-dev

namespace: ralphglasses-dev

commonLabels:
  app.kubernetes.io/environment: dev

resources:
  - ../../base

patches:
  # Reduce replicas to 1 for dev
  - target:
      kind: Deployment
      name: ralphglasses
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  # Lower resource limits for dev
  - target:
      kind: Deployment
      name: ralphglasses
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
  # Smaller PVC for dev
  - target:
      kind: PersistentVolumeClaim
      name: ralphglasses-workspace
    patch: |
      - op: replace
        path: /spec/resources/requests/storage
        value: 2Gi

configMapGenerator:
  - name: ralphglasses-config
    behavior: merge
    literals:
      - budget.maxSessionCost=1.00
      - budget.maxDailyCost=10.00
      - budget.costTier=cheap
